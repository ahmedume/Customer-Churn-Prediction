<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">Customer Churn Predictor</h1>
        <form id="churnForm" class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Senior Citizen</label>
                <select class="form-select" name="SeniorCitizen">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Partner</label>
                <select class="form-select" name="Partner">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Dependents</label>
                <select class="form-select" name="Dependents">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Tenure (months)</label>
                <input type="number" class="form-control" name="tenure" value="12" min="0">
            </div>
            <div class="col-md-4">
                <label class="form-label">Phone Service</label>
                <select class="form-select" name="PhoneService">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Internet Service</label>
                <select class="form-select" name="InternetService">
                    <option value="DSL">DSL</option>
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Online Security</label>
                <select class="form-select" name="OnlineSecurity">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Online Backup</label>
                <select class="form-select" name="OnlineBackup">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Device Protection</label>
                <select class="form-select" name="DeviceProtection">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Tech Support</label>
                <select class="form-select" name="TechSupport">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Streaming TV</label>
                <select class="form-select" name="StreamingTV">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Streaming Movies</label>
                <select class="form-select" name="StreamingMovies">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Contract</label>
                <select class="form-select" name="Contract">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Paperless Billing</label>
                <select class="form-select" name="PaperlessBilling">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Payment Method</label>
                <select class="form-select" name="PaymentMethod">
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                    <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                    <option value="Credit card (automatic)">Credit card (automatic)</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Monthly Charges</label>
                <input type="number" class="form-control" name="MonthlyCharges" value="70" step="0.01">
            </div>
            <div class="col-md-4">
                <label class="form-label">Total Charges</label>
                <input type="number" class="form-control" name="TotalCharges" value="840" step="0.01">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Predict</button>
            </div>
        </form>
        <div id="result" class="mt-4 d-none">
            <div class="card">
                <div class="card-body text-center">
                    <h3 id="predictionText"></h3>
                    <p class="mb-0">Probability: <span id="probabilityText"></span></p>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('churnForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            const data = Object.fromEntries(form.entries());
            data.SeniorCitizen = parseInt(data.SeniorCitizen);
            data.tenure = parseInt(data.tenure);
            data.MonthlyCharges = parseFloat(data.MonthlyCharges);
            data.TotalCharges = parseFloat(data.TotalCharges);
            const resp = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await resp.json();
            const el = document.getElementById('result');
            el.classList.remove('d-none');
            document.getElementById('predictionText').textContent =
                result.churn === 1 ? '⚠️ Customer will churn' : '✓ Customer will stay';
            document.getElementById('predictionText').className =
                result.churn === 1 ? 'text-danger' : 'text-success';
            document.getElementById('probabilityText').textContent =
                (result.probability * 100).toFixed(1) + '%';
        });
    </script>
</body>
</html>
